<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Repo RAG Analyzer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <header>
    <a href="{{ url_for('home') }}" class="back-link">← Home</a>
    <h1>🔍 GitHub Repository RAG Analyzer</h1>
    <p>Connect a public repo and ask questions about its code.</p>
  </header>

  <section class="connect-box">
    <input type="text" id="repoUrl" placeholder="https://github.com/owner/repo" />
    <button id="connectBtn">Connect</button>
  </section>

  <p id="statusMsg" class="status"></p>

  <section class="chat-box" id="chatBox">
    <div class="chat-placeholder" id="chatPlaceholder">
      Connect a repository to start asking questions.
    </div>
  </section>

  <section class="ask-box">
    <input type="text" id="questionInput" placeholder="Ask something about the code..." disabled />
    <button id="askBtn" disabled>Ask</button>
  </section>
</div>

<script>
const repoUrlInput = document.getElementById("repoUrl");
const connectBtn = document.getElementById("connectBtn");
const statusMsg = document.getElementById("statusMsg");
const chatBox = document.getElementById("chatBox");
const chatPlaceholder = document.getElementById("chatPlaceholder");
const questionInput = document.getElementById("questionInput");
const askBtn = document.getElementById("askBtn");

function setStatus(text, isError = false) {
  statusMsg.textContent = text;
  statusMsg.className = "status " + (isError ? "error" : "success");
}

function addMessage(text, sender, sources = []) {
  if (chatPlaceholder) chatPlaceholder.remove();
  const msg = document.createElement("div");
  msg.className = "message " + sender;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  msg.appendChild(bubble);

  if (sources.length > 0) {
    const src = document.createElement("div");
    src.className = "sources";
    src.textContent = "Sources: " + sources.join(", ");
    msg.appendChild(src);
  }

  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

connectBtn.addEventListener("click", async () => {
  const repoUrl = repoUrlInput.value.trim();
  if (!repoUrl) {
    setStatus("Please enter a repository URL.", true);
    return;
  }

  connectBtn.disabled = true;
  connectBtn.textContent = "Indexing...";
  setStatus("Fetching and indexing repository files. This can take a bit for large repos...");

  try {
    const res = await fetch("/connect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_url: repoUrl })
    });
    const data = await res.json();

    if (!res.ok) {
      setStatus(data.error || "Failed to connect repo.", true);
    } else {
      setStatus(data.message);
      questionInput.disabled = false;
      askBtn.disabled = false;
      addMessage(`Connected to ${repoUrl}. Ask me anything about this codebase.`, "bot");
    }
  } catch (err) {
    setStatus("Something went wrong: " + err.message, true);
  } finally {
    connectBtn.disabled = false;
    connectBtn.textContent = "Connect";
  }
});

askBtn.addEventListener("click", askQuestion);
questionInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") askQuestion();
});

async function askQuestion() {
  const question = questionInput.value.trim();
  if (!question) return;

  addMessage(question, "user");
  questionInput.value = "";
  askBtn.disabled = true;

  const loadingId = "loading-" + Date.now();
  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message bot";
  loadingMsg.id = loadingId;
  loadingMsg.innerHTML = `<div class="bubble">Thinking...</div>`;
  chatBox.appendChild(loadingMsg);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    document.getElementById(loadingId).remove();

    if (!res.ok) {
      addMessage(data.error || "Something went wrong.", "bot");
    } else {
      addMessage(data.answer, "bot", data.sources || []);
    }
  } catch (err) {
    document.getElementById(loadingId).remove();
    addMessage("Error: " + err.message, "bot");
  } finally {
    askBtn.disabled = false;
  }
}
</script>

</body>
</html>
